quarkus.application.name=${OTEL_SERVICE_NAME:oficina-billing-service}
quarkus.swagger-ui.always-include=true

oficina.observability.enabled=${OFICINA_OBSERVABILITY_ENABLED:true}
oficina.observability.json-logs.enabled=${OFICINA_OBSERVABILITY_JSON_LOGS_ENABLED:${oficina.observability.enabled}}
oficina.observability.metrics.enabled=${OFICINA_OBSERVABILITY_METRICS_ENABLED:${oficina.observability.enabled}}
oficina.observability.tracing.enabled=${OFICINA_OBSERVABILITY_TRACING_ENABLED:${oficina.observability.enabled}}
oficina.observability.deployment-environment=${DEPLOYMENT_ENVIRONMENT:local}
oficina.persistence.kind=postgresql
oficina.messaging.enabled=${OFICINA_MESSAGING_ENABLED:false}
oficina.messaging.publisher.enabled=${OFICINA_MESSAGING_PUBLISHER_ENABLED:${oficina.messaging.enabled}}
oficina.messaging.consumer.enabled=${OFICINA_MESSAGING_CONSUMER_ENABLED:${oficina.messaging.enabled}}
oficina.messaging.worker.enabled=${OFICINA_MESSAGING_WORKER_ENABLED:${oficina.messaging.enabled}}
oficina.messaging.poll-interval-ms=${OFICINA_MESSAGING_POLL_INTERVAL_MS:250}
oficina.messaging.shutdown-timeout-ms=${OFICINA_MESSAGING_SHUTDOWN_TIMEOUT_MS:5000}
oficina.messaging.publisher.batch-size=${OFICINA_MESSAGING_PUBLISHER_BATCH_SIZE:10}
oficina.messaging.publisher.max-attempts=${OFICINA_MESSAGING_PUBLISHER_MAX_ATTEMPTS:5}
oficina.messaging.publisher.backoff-base-ms=${OFICINA_MESSAGING_PUBLISHER_BACKOFF_BASE_MS:1000}
oficina.messaging.publisher.claim-lease-ms=${OFICINA_MESSAGING_PUBLISHER_CLAIM_LEASE_MS:30000}
oficina.messaging.consumer.max-messages=${OFICINA_MESSAGING_CONSUMER_MAX_MESSAGES:5}
oficina.messaging.consumer.wait-time-seconds=${OFICINA_MESSAGING_CONSUMER_WAIT_TIME_SECONDS:10}
oficina.messaging.endpoint-override=${OFICINA_MESSAGING_ENDPOINT_OVERRIDE:}
oficina.messaging.aws-account-id=${AWS_ACCOUNT_ID:}
oficina.messaging.aws-access-key-id=${AWS_ACCESS_KEY_ID:}
oficina.messaging.aws-secret-access-key=${AWS_SECRET_ACCESS_KEY:}
oficina.messaging.aws-session-token=${AWS_SESSION_TOKEN:}

quarkus.log.console.json.enabled=${oficina.observability.json-logs.enabled}
quarkus.log.console.json.exception-output-type=detailed
quarkus.log.console.json.mdc.flat-fields=true
quarkus.log.console.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."service.namespace".value=oficina
quarkus.log.console.json.additional-field."service.version".value=${quarkus.application.version:unknown}
quarkus.log.console.json.additional-field."deployment.environment".value=${oficina.observability.deployment-environment}

quarkus.micrometer.export.prometheus.path=/q/metrics

quarkus.otel.enabled=true
quarkus.otel.traces.enabled=${oficina.observability.tracing.enabled}
quarkus.otel.traces.exporter=cdi
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
quarkus.otel.instrument.vertx-http=true
quarkus.otel.resource.attributes=${OTEL_RESOURCE_ATTRIBUTES:service.namespace=oficina,deployment.environment=local}
quarkus.otel.traces.suppress-application-uris=/q/health,/q/health/*,/q/metrics,/q/openapi,/q/swagger-ui,/q/swagger-ui/*

quarkus.smallrye-health.openapi.included=false

oficina.mercado-pago.enabled=${OFICINA_MERCADO_PAGO_ENABLED:false}
oficina.mercado-pago.access-token=${OFICINA_MERCADO_PAGO_ACCESS_TOKEN:}
oficina.mercado-pago.webhook-secret=${OFICINA_MERCADO_PAGO_WEBHOOK_SECRET:}
oficina.mercado-pago.webhook-tolerance-seconds=${OFICINA_MERCADO_PAGO_WEBHOOK_TOLERANCE_SECONDS:300}
oficina.mercado-pago.api-mode=${OFICINA_MERCADO_PAGO_API_MODE:orders}
oficina.mercado-pago.payer-email=${OFICINA_MERCADO_PAGO_PAYER_EMAIL:cliente.local@oficina.com}
oficina.mercado-pago.payer-first-name=${OFICINA_MERCADO_PAGO_PAYER_FIRST_NAME:}
quarkus.rest-client.mercado-pago-api.url=${OFICINA_MERCADO_PAGO_API_URL:https://api.mercadopago.com}
quarkus.rest-client.mercado-pago-api.connect-timeout=3000
quarkus.rest-client.mercado-pago-api.read-timeout=10000

oficina.approval.notifications.enabled=${OFICINA_APPROVAL_NOTIFICATIONS_ENABLED:false}
oficina.approval.public-base-url=${OFICINA_PUBLIC_API_URL:http://localhost:8080}
quarkus.rest-client.notification-api.url=${OFICINA_NOTIFICATION_API_URL:http://localhost:8080}

mp.jwt.verify.issuer=${OFICINA_AUTH_ISSUER:oficina-api}
mp.jwt.verify.audiences=${OFICINA_AUTH_AUDIENCE:oficina-billing-service}

%dev.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:file:src/main/resources/jwt/publicKey.pem}
%dev.quarkus.log.console.json.enabled=false
%dev.oficina.observability.deployment-environment=local

%test.mp.jwt.verify.publickey.location=classpath:test-jwt/publicKey.pem
%test.quarkus.log.console.json.enabled=false
%test.quarkus.otel.traces.enabled=false
%test.quarkus.http.test-port=0
%test.oficina.observability.deployment-environment=test
%test.oficina.persistence.kind=memory
%test.oficina.messaging.enabled=false
%test.oficina.messaging.worker.enabled=false

%prod.oficina.observability.deployment-environment=${DEPLOYMENT_ENVIRONMENT:prod}
%prod.mp.jwt.verify.issuer=${OFICINA_AUTH_ISSUER}
%prod.mp.jwt.verify.audiences=${OFICINA_AUTH_AUDIENCE}
%prod.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION}
%prod.oficina.persistence.kind=postgresql
%prod.oficina.messaging.enabled=${OFICINA_MESSAGING_ENABLED:true}
%prod.oficina.approval.notifications.enabled=${OFICINA_APPROVAL_NOTIFICATIONS_ENABLED:true}
%prod.oficina.approval.public-base-url=${OFICINA_PUBLIC_API_URL:${OFICINA_AUTH_ISSUER}}
%prod.quarkus.rest-client.notification-api.url=${OFICINA_NOTIFICATION_API_URL:${OFICINA_AUTH_ISSUER}}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${JDBC_DATABASE_URL}
%prod.quarkus.datasource.reactive.url=${REACTIVE_DATABASE_URL}
%prod.quarkus.datasource.devservices.enabled=false

%lab.oficina.observability.deployment-environment=${DEPLOYMENT_ENVIRONMENT:lab}
%lab.mp.jwt.verify.issuer=${OFICINA_AUTH_ISSUER}
%lab.mp.jwt.verify.audiences=${OFICINA_AUTH_AUDIENCE}
%lab.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION}
%lab.oficina.persistence.kind=postgresql
%lab.oficina.messaging.enabled=${OFICINA_MESSAGING_ENABLED:true}
%lab.oficina.approval.notifications.enabled=${OFICINA_APPROVAL_NOTIFICATIONS_ENABLED:true}
%lab.oficina.approval.public-base-url=${OFICINA_PUBLIC_API_URL:${OFICINA_AUTH_ISSUER}}
%lab.quarkus.rest-client.notification-api.url=${OFICINA_NOTIFICATION_API_URL:${OFICINA_AUTH_ISSUER}}
%lab.quarkus.datasource.username=${DB_USERNAME}
%lab.quarkus.datasource.password=${DB_PASSWORD}
%lab.quarkus.datasource.jdbc.url=${JDBC_DATABASE_URL}
%lab.quarkus.datasource.reactive.url=${REACTIVE_DATABASE_URL}
%lab.quarkus.datasource.devservices.enabled=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:oficina_billing_user}
quarkus.datasource.password=${DB_PASSWORD:oficina_billing_password}
quarkus.datasource.jdbc.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/oficina_billing}
quarkus.datasource.reactive.url=${REACTIVE_DATABASE_URL:postgresql://localhost:5432/oficina_billing}

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.hibernate-orm.schema-management.strategy=none

%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.port=${DEV_POSTGRES_PORT:32772}
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.migrate-at-start=true

%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.flyway.active=false
%test.quarkus.flyway.clean-at-start=false
%test.quarkus.flyway.migrate-at-start=false

%prod.quarkus.flyway.clean-at-start=false
%prod.quarkus.flyway.migrate-at-start=true
%lab.quarkus.flyway.clean-at-start=false
%lab.quarkus.flyway.migrate-at-start=true
